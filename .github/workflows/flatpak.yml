name: Flatpak

on:
  push:
  pull_request:

jobs:
  flatpak:
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Update manifest with current commit
        run: packager/flatpak/update-manifest-commit.sh packager/flatpak/org.peergos.Peergos.yaml ${{ github.sha }}  
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: peergos-${{ matrix.variant.arch }}.flatpak
          manifest-path: packager/flatpak/org.peergos.Peergos.yaml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}
          verbose: true
