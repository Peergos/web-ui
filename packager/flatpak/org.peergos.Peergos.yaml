app-id: org.peergos.Peergos
runtime: org.freedesktop.Platform
runtime-version: "25.08"

base: org.chromium.Chromium
base-version: stable

sdk: org.freedesktop.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25

command: peergos

finish-args:
  - --share=network
  - --share=ipc
  - --filesystem=~/.peergos:create
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.secrets

  - --device=dri
  - --device=usb
  - --socket=pulseaudio
  - --socket=cups
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=xdg-run/pipewire-0:ro
  - --env=LD_LIBRARY_PATH=/app/chromium/nonfree-codecs/lib
  - --env=PATH=/app/jre/bin:/app/bin:/usr/bin

inherit-extensions:
  - org.chromium.Chromium.Codecs

build-options:
  append-path: /usr/lib/sdk/openjdk25/bin
  env:
    JAVA_HOME: /usr/lib/sdk/openjdk25

cleanup:
  - "/app/ant"
  - "/app/bin/ant"
  - "/app/include"
  - "/app/lib/pkgconfig"
  - "/app/lib/libsecret/locale"
  - "*.la"
  - "*.a"

modules:
  # secret-tool, used by FlatpakSecretToolStore to keep the mount password in the
  # user's keyring rather than in mount-config.json. The runtime ships libsecret
  # but not its CLI, so we build it here (library + tool, nothing else).
  - name: libsecret
    buildsystem: meson
    config-opts:
      # /app/share/locale is a dangling symlink in the Chromium base, so installing
      # libsecret's .mo files there fails. We don't ship them — park them out of the way.
      - -Dlocaledir=/app/lib/libsecret/locale
      - -Dmanpage=false
      - -Dvapi=false
      - -Dgtk_doc=false
      - -Dintrospection=false
      - -Dbash_completion=disabled
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.7.tar.xz
        sha256: 6b452e4750590a2b5617adc40026f28d2f4903de15f1250e1d1c40bfd68ed55e

  - name: chromium-codecs-dir
    buildsystem: simple
    build-commands:
      - mkdir -p /app/chromium/nonfree-codecs/lib

  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk25/install.sh

  - name: ant
    buildsystem: simple
    build-commands:
      - ./build.sh
      - mkdir -p /app/ant
      - mkdir -p /app/bin
      - cp -r dist /app/ant
      - ln -s /app/ant/bin/ant /app/bin/ant
    sources:
      - type: archive
        url: https://downloads.apache.org/ant/source/apache-ant-1.10.17-src.tar.gz
        sha256: f0390a5cee1076077f9adb8feddd99331feba4a9887f3379992b8b6b27be645c

  - name: peergos
    buildsystem: simple
    build-commands:
      - export JAVA_HOME=/app/jdk
      - export PATH=$JAVA_HOME/bin:$PATH/app/jdk

      - ant dist

      - install -Dm644 server/Peergos.jar /app/share/peergos/Peergos.jar

      - install -Dm755 peergos.sh /app/bin/peergos

      - install -Dm755 packager/flatpak/flatpak.sh /app/bin/flatpak.sh

      - install -Dm644 packager/flatpak/org.peergos.Peergos.desktop /app/share/applications/org.peergos.Peergos.desktop

      - install -Dm644 packager/flatpak/peergos.svg /app/share/icons/hicolor/scalable/apps/org.peergos.Peergos.svg

      - install -Dm644 packager/flatpak/org.peergos.Peergos.metainfo.xml /app/share/metainfo/org.peergos.Peergos.metainfo.xml

    sources:
      - type: git
        url: http://github.com/peergos/web-ui.git
        commit: a6526c84e12d77638cd2a069fdaa579084663936

      - type: file
        path: peergos.sh
